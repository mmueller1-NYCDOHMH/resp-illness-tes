[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Override the production basePath if deploying to Netlify's root domain
  # rather than the /assets/doh/respiratory-illness-data subpath.
  # Uncomment and set to "" if needed:
  # NEXT_PUBLIC_BASE_PATH = ""
